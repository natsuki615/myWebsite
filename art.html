<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>car's art</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            canvas {
                position: fixed;
                top: 0; left: 0;
                background: transparent;
                width: 100vw; height: 100vh;
                z-index: 9999;
                pointer-events: none;
            }

            header {
                position: fixed;
                top: 0; left: 0;
                width: 100%;
                z-index: 5000;
                pointer-events: none;
            }
            header nav a { pointer-events: all; }

            .page-content {
                padding-top: 70px;
                display: flex;
                flex-direction: column;
                align-items: center;
                min-height: 100vh;
                box-sizing: border-box;
            }

            /*  toggle  */
            .view-toggle {
                position: fixed;
                top: 60px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 200;
                display: flex;
                gap: 4px;
            }
            .view-toggle button {
                border: none;
                background: transparent;
                color: rgba(255,255,255,0.6);
                font-size: 0.8rem;
                letter-spacing: 0.06em;
                padding: 6px 20px;
                border-radius: 24px;
                cursor: pointer;
                transition: background 0.18s, color 0.18s;
            }
            .view-toggle button.active {
                background: rgba(255,255,255,0.88);
                color: #5a1fa0;
                font-weight: 600;
            }

            /* collage area row */
            .collage-area {
                display: flex;
                gap: 10px;
                width: 93vw;
                margin-bottom: 40px;
                align-items: stretch;
            }

            /* toolbar — floating overlay */
            .collage-toolbar {
                position: fixed;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 200;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                width: 38px;
                background: rgba(255,255,255,0.12);
                backdrop-filter: blur(6px);
                border: 1px solid rgba(255,255,255,0.2);
                border-radius: 10px;
                padding: 10px 7px;
                box-sizing: border-box;
            }
            .tb-label {
                color: rgba(255,255,255,0.5);
                font-size: 0.6rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                writing-mode: vertical-rl;
                margin-bottom: 2px;
            }
            .tb-swatches {
                display: flex;
                flex-direction: column;
                gap: 6px;
                align-items: center;
            }
            .swatch {
                width: 20px; height: 20px;
                border-radius: 50%;
                border: 2px solid rgba(255,255,255,0.35);
                cursor: pointer;
                transition: transform 0.12s, border-color 0.12s;
                flex-shrink: 0;
            }
            .swatch:hover { transform: scale(1.2); }
            .swatch.active { border-color: #fff; border-width: 2.5px; }

            #bgDim {
                writing-mode: vertical-lr;
                direction: rtl;
                width: 20px;
                height: 60px;
                cursor: pointer;
                accent-color: rgba(255,255,255,0.8);
                opacity: 0.6;
                margin-top: 6px;
            }
            #bgDim:hover { opacity: 1; }

            .tb-color-wrap {
                position: relative;
                width: 20px; height: 20px;
                border-radius: 50%;
                overflow: hidden;
                border: 2px solid rgba(255,255,255,0.35);
                cursor: pointer;
                flex-shrink: 0;
            }
            .tb-color-wrap input[type="color"] {
                position: absolute;
                inset: -4px;
                width: calc(100% + 8px);
                height: calc(100% + 8px);
                border: none;
                padding: 0;
                cursor: pointer;
                opacity: 0;
            }
            .tb-color-icon {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 10px;
                pointer-events: none;
                color: rgba(255,255,255,0.8);
            }

            /* collage panel */
            .collage-panel {
                position: fixed;
                inset: 0;
                z-index: 50;
                overflow: hidden;
                transition: background 0.3s;
            }
            .board {
                position: absolute;
                inset: 0;
            }

            .img-wrapper {
                position: absolute;
                display: inline-block;
                cursor: grab;
                user-select: none;
            }
            .img-wrapper.dragging { cursor: grabbing; }

            .collage-img {
                display: block;
                width: 100%;
                pointer-events: none;
            }

            .rot-handle, .resize-handle {
                position: absolute;
                width: 24px; height: 24px;
                background: white;
                border: none;
                border-radius: 50%;
                opacity: 0;
                transition: opacity 0.15s;
                z-index: 2;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 1px 4px rgba(0,0,0,0.25);
                padding: 4px;
                box-sizing: border-box;
            }
            .rot-handle img, .resize-handle img {
                width: 100%; height: 100%;
                display: block;
                pointer-events: none;
            }
            .img-wrapper:hover .rot-handle,
            .img-wrapper:hover .resize-handle { opacity: 1; }
            .rot-handle {
                top: -30px; left: 50%;
                transform: translateX(-50%);
                cursor: crosshair;
            }
            .resize-handle {
                bottom: -12px; right: -12px;
                cursor: nwse-resize;
            }

            .hint {
                position: absolute;
                bottom: 10px; left: 50%;
                transform: translateX(-50%);
                color: rgba(255,255,255,0.35);
                font-size: 0.72rem;
                letter-spacing: 0.06em;
                pointer-events: none;
                white-space: nowrap;
            }

            /*  gallery grid  */
            .gallery-grid {
                width: 88vw;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                margin-bottom: 50px;
                align-items: start;
            }
            .gallery-grid img,
            .gallery-grid video {
                width: 100%;
                display: block;
                border-radius: 6px;
            }
            .gallery-wide {
                grid-column: span 2;
            }
            .gallery-extrawide {
                grid-column: span 3;
            }
        </style>
    </head>
    <body style="background: #001524;">
        <canvas id="canvas"></canvas>

        <header>
            <nav class="links">
                <a href="index.html" class="home">home</a>
                <a href="aboutme.html" class="home">my person</a>
                <a href="art.html" class="home">my art</a>
                <a href="projects.html" class="home">my projects</a>
                <a href="contact.html" class="home">my contact</a>
            </nav>
        </header>

        <div class="page-content">

            <div class="view-toggle">
                <button id="btnCollage" class="active">collage</button>
                <button id="btnGallery">gallery</button>
            </div>

            <!-- collage area: sidebar + panel -->
            <div class="collage-area" id="collageArea">
                <div class="collage-toolbar" id="collageToolbar">
                    <div class="tb-swatches" id="bgSwatches">
                        <div class="swatch active" data-bg="" style="background:#001524" title="default"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/rocketship.png" style="background: url('assets/images/sketchbook/rocketship.png') center/cover no-repeat" title="rocketship"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/dots.png"       style="background: url('assets/images/sketchbook/dots.png') center/cover no-repeat"       title="dots"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/eyes.png"       style="background: url('assets/images/sketchbook/eyes.png') center/cover no-repeat"       title="eyes"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/doodle.png"     style="background: url('assets/images/sketchbook/doodle.png') center/cover no-repeat"     title="doodle"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/fish.png"       style="background: url('assets/images/sketchbook/fish.png') center/cover no-repeat"       title="fish"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/green.png"      style="background: url('assets/images/sketchbook/green.png') center/cover no-repeat"      title="green"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/love.png"       style="background: url('assets/images/sketchbook/love.png') center/cover no-repeat"       title="love"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/red.png"        style="background: url('assets/images/sketchbook/red.png') center/cover no-repeat"        title="red"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/more_eyes.png"  style="background: url('assets/images/sketchbook/more_eyes.png') center/cover no-repeat"  title="more_eyes"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/stars.png"      style="background: url('assets/images/sketchbook/stars.png') center/cover no-repeat"      title="stars"></div>
                        <div class="swatch" data-img="assets/images/sketchbook/sun.png"        style="background: url('assets/images/sketchbook/sun.png') center/cover no-repeat"        title="sun"></div>
                        <div class="tb-color-wrap" title="custom">
                            <div class="tb-color-icon">✦</div>
                            <input type="color" id="bgCustom" value="#ffffff">
                        </div>
                    </div>
                    <input type="range" id="bgDim" min="0" max="1" step="0.05" value="0.45" title="brightness">
                </div>

                <div class="collage-panel" id="collageView">
                    <div class="board" id="board"></div>
                </div>
            </div>

            <!-- gallery view -->
            <div class="gallery-grid" id="galleryView" style="display:none;"></div>

        </div>


        <script src="particles.js"></script>
        <script src="intro.js"></script>
        <script>
            const canvas = document.getElementById('canvas');
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            document.addEventListener('click', burstParticles);

            const arts = [
                "assets/images/art_cutouts/bra1.png",
                "assets/images/art_cutouts/bra2.png",
                "assets/images/art_cutouts/bra3.png",
                "assets/images/art_cutouts/cz_hand_sm2.png",
                "assets/images/art_cutouts/cz_seven_sm.png",
                "assets/images/art_cutouts/cz_tree_sm.png",
                "assets/images/art_cutouts/cz_vase_sm.png",
                "assets/images/art_cutouts/lovers.png",
                "assets/images/art_cutouts/kitchen1.png",
                "assets/images/art_cutouts/kitchen2.png",
                "assets/images/art_cutouts/kitchen3.png",
                "assets/images/art_cutouts/kitchen4.png",
                "assets/images/art_cutouts/mirrorball_03.png",
                "assets/images/art_cutouts/self.png",
                "assets/images/art_cutouts/threetree.png",
                "assets/images/art_cutouts/vase1.png",
                "assets/images/art_cutouts/vase2.png",
                "assets/images/art_cutouts/vase3.png",
                "assets/images/art_cutouts/vase4.png",
                "assets/images/art_cutouts/vase5.png"
            ];

            /*  toggle  */
            const collageArea = document.getElementById('collageArea');
            const collageView = document.getElementById('collageView');
            const galleryView = document.getElementById('galleryView');
            const btnCollage  = document.getElementById('btnCollage');
            const btnGallery  = document.getElementById('btnGallery');

            btnCollage.addEventListener('click', () => {
                collageArea.style.display = '';
                galleryView.style.display = 'none';
                btnCollage.classList.add('active');
                btnGallery.classList.remove('active');
            });
            btnGallery.addEventListener('click', () => {
                collageArea.style.display = 'none';
                galleryView.style.display = '';
                btnGallery.classList.add('active');
                btnCollage.classList.remove('active');
            });

            /* background swatches  */
            let currentImgUrl = null;
            let dimAmount = 0.45;

            function buildImgBg(url) {
                return `linear-gradient(rgba(0,0,0,${dimAmount}),rgba(0,0,0,${dimAmount})), url('${url}') center/cover no-repeat`;
            }

            document.querySelectorAll('#bgSwatches .swatch').forEach(s => {
                s.addEventListener('click', () => {
                    document.querySelectorAll('#bgSwatches .swatch').forEach(x => x.classList.remove('active'));
                    s.classList.add('active');
                    if (s.dataset.img) {
                        currentImgUrl = s.dataset.img;
                        collageView.style.background = buildImgBg(currentImgUrl);
                    } else {
                        currentImgUrl = null;
                        collageView.style.background = s.dataset.bg || '';
                    }
                });
            });
            document.getElementById('bgDim').addEventListener('input', e => {
                dimAmount = parseFloat(e.target.value);
                if (currentImgUrl) collageView.style.background = buildImgBg(currentImgUrl);
            });
            document.getElementById('bgCustom').addEventListener('input', e => {
                document.querySelectorAll('#bgSwatches .swatch').forEach(x => x.classList.remove('active'));
                currentImgUrl = null;
                collageView.style.background = e.target.value;
            });

            /* build gallery */
            const galleryItems = [
                { type: 'img',   src: "assets/images/art/cz_vase_sm.png" },
                { type: 'img',   src: "assets/images/art/cz_seven_2.png" },
                { type: 'img',   src: "assets/images/art/cz_hand_sm2.png" },

                { type: 'video', src: "assets/videos/heart.mov", extrawide: true },
                
                { type: 'img',   src: "assets/images/art/ceramics_vase.jpg", wide: true },
                { type: 'img', src: "assets/images/art/ceramics_vase3.jpg" },
                
                // { type: 'img',   src: "assets/images/art/mirrorball_03.jpg" },
                { type: 'video', src: "assets/videos/spun54.mp4", extrawide: true },

                { type: 'img',   src: "assets/images/art/cz_glass_sm.png" },
                { type: 'img',   src: "assets/images/art/cz_tree_sm.png" },
                { type: 'img',   src: "assets/images/art/shroom.png" },

                { type: 'img',   src: "assets/images/art/self.jpg" },
                { type: 'img',   src: "assets/images/art/lovers.jpg" },
                { type: 'img',   src: "assets/images/art/fly.png" },
                
                { type: 'img',   src: "assets/images/art/cz_blackhole_sm.jpg", extrawide: true },
            ];
            galleryItems.forEach(({ type, src, wide, extrawide }) => {
                let el;
                if (type === 'video') {
                    el = document.createElement('video');
                    el.autoplay = true;
                    el.loop = true;
                    el.muted = true;
                    el.playsInline = true;
                } else {
                    el = document.createElement('img');
                }
                el.src = src;
                if (wide) el.classList.add('gallery-wide');
                if (extrawide) el.classList.add('gallery-extrawide');
                galleryView.appendChild(el);
            });

            /*  build collage  */
            const board = document.getElementById('board');
            let topZ = 10;

            const panelW = collageView.offsetWidth;
            const panelH = collageView.offsetHeight;
            const cols = 5;
            const rows = Math.ceil(arts.length / cols);
            const cellW = panelW / cols;
            const cellH = panelH / rows;

            arts.forEach((src, i) => {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const maxImgW = Math.min(cellW * 0.75, 200);
                const width = Math.floor(maxImgW * 0.7 + Math.random() * maxImgW * 0.3);
                const x = col * cellW + (cellW - width) * 0.1 + Math.random() * (cellW - width) * 0.7;
                const y = row * cellH + Math.random() * cellH * 0.3;
                const rot = (Math.random() - 0.5) * 18;

                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper';
                wrapper.style.cssText = `left:${x}px; top:${y}px; width:${width}px; transform:rotate(${rot}deg); z-index:${i+1}`;

                const img = document.createElement('img');
                img.src = src;
                img.className = 'collage-img';
                img.draggable = false;

                const rotHandle    = document.createElement('div');
                rotHandle.className = 'rot-handle';
                const rotImg = document.createElement('img');
                rotImg.src = 'assets/images/rotate.png';
                rotHandle.appendChild(rotImg);

                const resizeHandle = document.createElement('div');
                resizeHandle.className = 'resize-handle';
                const zoomImg = document.createElement('img');
                zoomImg.src = 'assets/images/zoom.png';
                resizeHandle.appendChild(zoomImg);

                wrapper.appendChild(img);
                wrapper.appendChild(rotHandle);
                wrapper.appendChild(resizeHandle);
                board.appendChild(wrapper);
                makeInteractive(wrapper, rot);
            });

            /*  interaction  */
            function getCenter(el) {
                const r = el.getBoundingClientRect();
                return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
            }
            function bind(mv, up) {
                document.addEventListener('mousemove', mv);
                document.addEventListener('mouseup', up);
                document.addEventListener('touchmove', mv, { passive: true });
                document.addEventListener('touchend', up);
            }
            function unbind(mv, up) {
                document.removeEventListener('mousemove', mv);
                document.removeEventListener('mouseup', up);
                document.removeEventListener('touchmove', mv);
                document.removeEventListener('touchend', up);
            }

            function makeInteractive(wrapper, initialRot) {
                let currentRot = initialRot;
                const rotHandle    = wrapper.querySelector('.rot-handle');
                const resizeHandle = wrapper.querySelector('.resize-handle');

                wrapper.addEventListener('mousedown', startMove);
                wrapper.addEventListener('touchstart', startMove, { passive: true });
                function startMove(e) {
                    if (e.target === rotHandle || e.target === resizeHandle) return;
                    wrapper.classList.add('dragging');
                    wrapper.style.zIndex = ++topZ;
                    const t = e.touches ? e.touches[0] : e;
                    const sx = t.clientX, sy = t.clientY;
                    const ol = wrapper.offsetLeft, ot = wrapper.offsetTop;
                    function mv(e) {
                        const t = e.touches ? e.touches[0] : e;
                        wrapper.style.left = (ol + t.clientX - sx) + 'px';
                        wrapper.style.top  = (ot + t.clientY - sy) + 'px';
                    }
                    function up() { wrapper.classList.remove('dragging'); unbind(mv, up); }
                    bind(mv, up);
                }

                rotHandle.addEventListener('mousedown', startRotate);
                rotHandle.addEventListener('touchstart', startRotate, { passive: true });
                function startRotate(e) {
                    e.stopPropagation();
                    wrapper.style.zIndex = ++topZ;
                    const t = e.touches ? e.touches[0] : e;
                    const c = getCenter(wrapper);
                    const sa = Math.atan2(t.clientY - c.y, t.clientX - c.x) * 180 / Math.PI;
                    const sr = currentRot;
                    function mv(e) {
                        const t = e.touches ? e.touches[0] : e;
                        const c = getCenter(wrapper);
                        const a = Math.atan2(t.clientY - c.y, t.clientX - c.x) * 180 / Math.PI;
                        currentRot = sr + (a - sa);
                        wrapper.style.transform = `rotate(${currentRot}deg)`;
                    }
                    function up() { unbind(mv, up); }
                    bind(mv, up);
                }

                resizeHandle.addEventListener('mousedown', startResize);
                resizeHandle.addEventListener('touchstart', startResize, { passive: true });
                function startResize(e) {
                    e.stopPropagation();
                    wrapper.style.zIndex = ++topZ;
                    const t = e.touches ? e.touches[0] : e;
                    const sx = t.clientX, sy = t.clientY;
                    const sw = wrapper.offsetWidth;
                    const rad = currentRot * Math.PI / 180;
                    function mv(e) {
                        const t = e.touches ? e.touches[0] : e;
                        const d = (t.clientX - sx) * Math.cos(rad) + (t.clientY - sy) * Math.sin(rad);
                        wrapper.style.width = Math.max(50, sw + d) + 'px';
                    }
                    function up() { unbind(mv, up); }
                    bind(mv, up);
                }
            }
        </script>
    </body>
</html>
